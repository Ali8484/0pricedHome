<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>مولد الرموز المشفرة - 1000 رمز</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        body {
            background: #0f172a;
            color: #fff;
            font-family: monospace;
            padding: 20px;
            text-align: center;
        }
        button {
            background: #22c55e;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            margin: 20px;
            font-weight: bold;
        }
        button:hover { background: #16a34a; }
        .status {
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            margin: 20px auto;
            max-width: 600px;
            text-align: left;
        }
        .success { color: #22c55e; }
        .info { color: #3b82f6; }
    </style>
</head>
<body>
    <h1>🔐 مولد الرموز المشفرة (1000 رمز)</h1>
    <p>اضغط الزر لإنشاء 1000 رمز فريد وتشفيرها</p>
    <button onclick="generateAndDownload()">🎲 توليد وتحميل encrypted-codes.json</button>
    <div id="status" class="status">⏳ جاهز...</div>

    <script>
        // 🔐 المفتاح السري (يجب أن يكون مطابقاً للموجود في index.html)
        const MASTER_SECRET = "S3cur3K3y!@#2025_AES2025";
        const SECONDARY_SECRET = "BFT%JQH";
        
        // دالة XOR للتشفير الإضافي
        function xorEncrypt(str, key) {
            let result = '';
            for (let i = 0; i < str.length; i++) {
                result += String.fromCharCode(str.charCodeAt(i) ^ key.charCodeAt(i % key.length));
            }
            return result;
        }
        
        // دالة تشفير الرمز (نفس الموجودة في نظام الدخول)
        function encryptCode(plainCode) {
            // الطبقة الأولى: XOR
            const xored = xorEncrypt(plainCode, SECONDARY_SECRET);
            // الطبقة الثانية: AES
            return CryptoJS.AES.encrypt(xored, MASTER_SECRET).toString();
        }
        
        // توليد 1000 رمز فريد
        function generateUniqueCodes() {
            const codes = [];
            const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            
            while (codes.length < 1000) {
                const l1 = letters[Math.floor(Math.random() * letters.length)];
                const l2 = letters[Math.floor(Math.random() * letters.length)];
                const num = Math.floor(Math.random() * 1000).toString().padStart(3, '0');
                const code = l1 + l2 + num;
                if (!codes.includes(code)) {
                    codes.push(code);
                }
            }
            return codes;
        }
        
        async function generateAndDownload() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = '🔄 جاري توليد 1000 رمز فريد...';
            
            // توليد الرموز
            const plainCodes = generateUniqueCodes();
            statusDiv.innerHTML = `✅ تم توليد ${plainCodes.length} رمز فريد<br>🔄 جاري التشفير...`;
            
            // تشفير جميع الرموز
            const encryptedCodes = [];
            for (let i = 0; i < plainCodes.length; i++) {
                encryptedCodes.push(encryptCode(plainCodes[i]));
                if ((i + 1) % 100 === 0) {
                    statusDiv.innerHTML = `✅ تم تشفير ${i + 1}/${plainCodes.length} رمز...`;
                    await new Promise(r => setTimeout(r, 10));
                }
            }
            
            statusDiv.innerHTML = `✨ تم تشفير جميع الرموز بنجاح!<br>📥 جاري تحميل الملف...`;
            
            // إنشاء ملف JSON
            const json = JSON.stringify(encryptedCodes, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'encrypted-codes.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            // عرض أول 10 رموز للتحقق
            statusDiv.innerHTML = `
                <span class="success">✅ تم التحميل بنجاح!</span><br>
                📁 الملف: encrypted-codes.json<br>
                📊 عدد الرموز: ${plainCodes.length}<br>
                🔑 أول 3 رموز أصلية: ${plainCodes.slice(0, 3).join(', ')}<br>
                🔒 أول 3 رموز مشفرة: ${encryptedCodes.slice(0, 3).join(', ').substring(0, 80)}...<br>
                <span class="info">💡 انسخ ملف encrypted-codes.json إلى نفس مجلد index.html</span>
            `;
            
            // طباعة في console للتحقق
            console.log('الرموز الأصلية (أول 10):', plainCodes.slice(0, 10));
            console.log('الرموز المشفرة (أول 3):', encryptedCodes.slice(0, 3));
        }
    </script>
</body>
</html>
